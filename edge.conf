# ===== HTTP → HTTPS 全量跳转 =====
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ===== www.huanfaai.com → 宣传页静态 =====
server {
    listen 443 ssl;
    http2 on;
    server_name www.huanfaai.com;

    ssl_certificate     /etc/nginx/certs/www.huanfaai.com.pem;
    ssl_certificate_key /etc/nginx/certs/www.huanfaai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/landing;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ===== api.huanfaai.com → 后端 FastAPI =====
server {
    listen 443 ssl;
    http2 on;
    server_name api.huanfaai.com;

    ssl_certificate     /etc/nginx/certs/api.huanfaai.com.pem;
    ssl_certificate_key /etc/nginx/certs/api.huanfaai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;   # 顾客上传正面照

    location / {
        proxy_pass http://hair-ai-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# ===== admin.huanfaai.com → 管理后台静态 + /api 反代 =====
server {
    listen 443 ssl;
    http2 on;
    server_name admin.huanfaai.com;

    ssl_certificate     /etc/nginx/certs/admin.huanfaai.com.pem;
    ssl_certificate_key /etc/nginx/certs/admin.huanfaai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    root /usr/share/nginx/admin;
    index index.html;

    location /api/ {
        proxy_pass http://hair-ai-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
